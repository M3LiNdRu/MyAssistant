<app-toolbar (monthChangedEvent)="useMonth($event)" (showExpensesListEvent)="displayExpensesList($event)" (showInvestmentsEvent)="displayInvestments($event)" (showPortfoliosEvent)="displayPortfolios($event)"></app-toolbar>
<div class="content" role="main">
  @if (display && loggedIn) {
    <div>
      <app-month-summary [date]="current"></app-month-summary>
      <app-float-button (displayExpenseFormEvent)="displayExpensesForm($event)"></app-float-button>
    </div>
  }
  @if (displayForm) {
    <div>
      <app-expenses-form (displaySummaryEvent)="displaySummary($any($event))"></app-expenses-form>
    </div>
  }
  @if (displayList) {
    <div>
      <app-expenses-list [date]="current"></app-expenses-list>
    </div>
  }
  @if (displayTransactionsList) {
    <div>
      <app-transactions-list (displaySummaryEvent)="displaySummary($any($event))"></app-transactions-list>
    </div>
  }
  @if (displayTransactionsForm) {
    <div>
      <app-transactions-form (displaySummaryEvent)="displaySummary($any($event))"></app-transactions-form>
    </div>
  }
  @if (displayPortfolioManagement) {
    <div>
      <app-portfolio-management (displaySummaryEvent)="displaySummary($any($event))" (displayInvestmentsEvent)="displayInvestments($any($event))"></app-portfolio-management>
    </div>
  }
  @if (!loggedIn) {
    <div>
      <span>Please, login</span>
    </div>
  }
</div>
<app-footer></app-footer>
<router-outlet></router-outlet>
