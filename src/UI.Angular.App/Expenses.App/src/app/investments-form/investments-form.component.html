<div class="form-container">
  <h2>Add Investment</h2>
  <form [formGroup]="investmentForm" (ngSubmit)="addInvestment()">
    <mat-form-field appearance="fill">
      <mat-label>Portfolio</mat-label>
      <mat-select formControlName="portfolioId">
        @for (portfolio of portfolios; track portfolio.id) {
          <mat-option [value]="portfolio.id">{{ portfolio.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Asset Type</mat-label>
      <mat-select formControlName="assetType">
        @for (type of assetTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Symbol/Name</mat-label>
      <input matInput formControlName="symbol" placeholder="BTC, VTSAX, AAPL, etc.">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" placeholder="0.00" step="0.01">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Purchase Price</mat-label>
      <input matInput type="number" formControlName="purchasePrice" placeholder="0.00" step="0.01">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Purchase Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="purchaseDate">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Current Price</mat-label>
      <input matInput type="number" formControlName="currentPrice" placeholder="0.00" step="0.01">
    </mat-form-field>

    <div class="button-group">
      <button mat-raised-button color="primary" type="submit" [disabled]="!investmentForm.valid">
        Add Investment
      </button>
      <button mat-raised-button type="button" (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
