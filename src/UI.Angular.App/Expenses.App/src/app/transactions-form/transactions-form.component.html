<div class="form-container">
  <h2>Add Transaction</h2>
  <form [formGroup]="transactionForm" (ngSubmit)="submit()">

    <mat-form-field appearance="fill">
      <mat-label>Portfolio</mat-label>
      <mat-select formControlName="portfolioId">
        @for (portfolio of portfolios; track portfolio.id) {
          <mat-option [value]="portfolio.id">{{ portfolio.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        @for (type of transactionTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Asset Type</mat-label>
      <mat-select formControlName="assetType">
        @for (type of assetTypes; track type) {
          <mat-option [value]="type">{{ type }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Symbol / Name</mat-label>
      <input matInput formControlName="symbol" placeholder="BTC, VTSAX, AAPL…">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" placeholder="0.00" step="0.000001">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Price per unit</mat-label>
      <input matInput type="number" formControlName="price" placeholder="0.00" step="0.01">
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Notes (optional)</mat-label>
      <input matInput formControlName="notes" placeholder="e.g. DCA purchase">
    </mat-form-field>

    <div class="button-group">
      <button mat-raised-button color="primary" type="submit" [disabled]="transactionForm.invalid">
        Add Transaction
      </button>
      <button mat-raised-button type="button" (click)="cancel()">
        Cancel
      </button>
    </div>

  </form>
</div>
